<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Maskable PWA icon: full-bleed background so OS shapes (circle,
       squircle) never clip the artwork. Safe zone = central 80%. -->
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#g)"/>
  <rect x="144" y="144" width="224" height="224" rx="44" fill="none" stroke="#fff" stroke-width="24" opacity="0.9"/>
  <circle cx="256" cy="238" r="32" fill="#fff"/>
  <path d="M256 250 L256 314" stroke="#fff" stroke-width="32" stroke-linecap="round"/>
</svg>
