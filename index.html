<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="MetaCrypt — open-source client-side metadata editor with encrypted metadata support. Your files never leave your device."
    />
    <meta name="theme-color" content="#09090b" />
    <title>MetaCrypt — Metadata Editor & Encryption</title>
    <!--
      Theme bootstrap: applied BEFORE React mounts to avoid a light-mode
      flash for dark-theme users. Reads the persisted preference (theme
      choice is not a secret, so localStorage is fine here) and falls back
      to the OS-level `prefers-color-scheme`.
    -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('metacrypt-theme');
          var dark =
            stored === 'dark' ||
            (stored !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {
          /* localStorage may be unavailable (private mode) — default to light. */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
